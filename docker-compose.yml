services:
  postgres:
    image: postgres:16-alpine
    container_name: matchme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: matchme
      POSTGRES_PASSWORD: matchme_dev_password
      POSTGRES_DB: matchme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
